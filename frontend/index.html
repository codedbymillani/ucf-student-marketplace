<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCF Student Marketplace | Space U</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .space-bg {
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 75px 100px, #facc15, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 150px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 250px 200px, #ffffff, rgba(0,0,0,0));
            background-size: 300px 300px;
        }
    </style>
</head>
<body class="h-full text-zinc-100 flex flex-col space-bg">

    <div id="authModal" class="fixed inset-0 bg-zinc-950/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl w-full max-w-md p-8 shadow-2xl transition-all">
            
            <div class="text-center mb-6">
                <div class="flex justify-center mb-2">
                    <svg class="w-10 h-10 text-yellow-500 filter drop-shadow-[0_0_8px_rgba(250,204,21,0.4)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z"></path>
                    </svg>
                </div>
                <h1 class="text-xl font-bold uppercase tracking-wider text-zinc-50">UCF Student <span class="text-yellow-400">Marketplace</span></h1>
                <p class="text-xs text-zinc-400 mt-1" id="authSubtitle">Verify your identity to enter Space U</p>
            </div>

            <form id="authForm" class="space-y-4">
                <div id="registerFields" class="hidden space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-1">Email (UCF Recommended)</label>
                        <input type="email" id="authEmail" placeholder="nid@knights.ucf.edu" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:border-yellow-500 transition">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-1">Social Handle Contact</label>
                        <input type="text" id="authHandle" placeholder="@instagram, @snapchat" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:border-yellow-500 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-1">Username</label>
                    <input type="text" id="authUsername" required placeholder="knight_crawler" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:border-yellow-500 transition">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-1">Password</label>
                    <input type="password" id="authPassword" required placeholder="••••••••" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:border-yellow-500 transition">
                </div>

                <button type="submit" id="authButton" class="w-full bg-yellow-500 hover:bg-yellow-400 text-zinc-950 font-bold uppercase tracking-wider text-xs py-2.5 rounded-lg shadow-lg transition duration-200 mt-2">
                    Sign In
                </button>
            </form>

            <div class="text-center mt-6 text-xs text-zinc-400">
                <span id="toggleText">New around campus?</span>
                <button id="toggleAuthMode" class="text-yellow-400 hover:underline ml-1 font-semibold focus:outline-none">Create Account</button>
            </div>
        </div>
    </div>

    <header class="bg-zinc-900/90 backdrop-blur-md border-b border-yellow-500/30 sticky top-0 z-50 px-6 py-4 flex items-center justify-between shadow-xl">
        <div class="flex items-center space-x-3">
            <svg class="w-7 h-7 text-yellow-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z"></path>
            </svg>
            <span class="text-xl font-bold tracking-wider uppercase text-zinc-50">UCF Student <span class="text-yellow-400">Marketplace</span></span>
        </div>
        <a href="post.html" class="bg-yellow-500 hover:bg-yellow-400 text-zinc-950 font-bold px-5 py-2.5 rounded-lg transition duration-200 shadow-[0_0_15px_rgba(234,179,8,0.3)] text-sm tracking-wide">+ Post Listing</a>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-6 flex flex-col md:flex-row gap-8">
        <aside class="w-full md:w-64 flex-shrink-0 bg-zinc-900/60 border border-zinc-800 rounded-xl p-5 h-fit sticky top-24 backdrop-blur-sm">
            <h2 class="text-yellow-400 font-semibold uppercase tracking-wider text-sm mb-4 border-b border-zinc-800 pb-2">Filters</h2>
            <div class="mb-6">
                <label class="block text-xs font-medium text-zinc-400 uppercase tracking-wider mb-2">Search items</label>
                <input type="text" id="searchInput" placeholder="What are you searching for?" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:border-yellow-500 transition">
            </div>
            <div class="mb-6">
                <label class="block text-xs font-medium text-zinc-400 uppercase tracking-wider mb-2">Category</label>
                <div class="space-y-2 text-sm">
                    <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" class="accent-yellow-500 rounded"><span class="text-zinc-300 group-hover:text-zinc-100 transition">Clothes & Shoes</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" class="accent-yellow-500 rounded"><span class="text-zinc-300 group-hover:text-zinc-100 transition">Housing & Subleases</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" class="accent-yellow-500 rounded"><span class="text-zinc-300 group-hover:text-zinc-100 transition">Appliances & Items</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" class="accent-yellow-500 rounded"><span class="text-zinc-300 group-hover:text-zinc-100 transition">Services</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" class="accent-yellow-500 rounded"><span class="text-zinc-300 group-hover:text-zinc-100 transition">Textbooks</span></label>
                </div>
            </div>
            <div>
                <div class="flex justify-between items-baseline mb-2">
                    <label class="block text-xs font-medium text-zinc-400 uppercase tracking-wider">Max Price</label>
                    <span id="priceLabel" class="text-xs bg-yellow-500/10 text-yellow-400 font-bold px-2 py-0.5 rounded border border-yellow-500/20">$1500</span>
                </div>
                <input type="range" id="priceSlider" min="0" max="1500" value="1500" class="w-full accent-yellow-500 cursor-pointer bg-zinc-800 h-1.5 rounded-lg">
            </div>
        </aside>

        <section class="flex-1">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="listingsGrid">
                <div class="bg-zinc-900/40 border border-zinc-800 rounded-xl overflow-hidden shadow-lg flex flex-col group">
                    <div class="aspect-video w-full bg-zinc-800 relative flex items-center justify-center text-zinc-600 font-mono text-sm">
                        <span>🏢 Housing Image Preview</span>
                    </div>
                    <div class="p-4 flex-1 flex flex-col justify-between">
                        <div class="flex justify-between items-baseline mb-1">
                            <h3 class="font-semibold text-zinc-100 text-base truncate pr-2">Plaza 4x4 Summer Sublease</h3>
                            <span class="text-yellow-400 font-bold text-lg">$850</span>
                        </div>
                        <button class="w-full mt-4 bg-zinc-800 text-zinc-300 font-semibold text-xs tracking-wider uppercase py-2 rounded-lg">View Details</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-zinc-950 border-t border-zinc-900 py-6 text-center text-xs text-zinc-500 font-mono">
        &copy; 2026 UCF Student Marketplace | <span class="text-yellow-500/70">Space U 🌌</span>
    </footer>

    <script>
        const slider = document.getElementById('priceSlider');
        const label = document.getElementById('priceLabel');
        const toggleAuthBtn = document.getElementById('toggleAuthMode');
        const registerFields = document.getElementById('registerFields');
        const authBtn = document.getElementById('authButton');
        const toggleText = document.getElementById('toggleText');
        const authSubtitle = document.getElementById('authSubtitle');
        const authModal = document.getElementById('authModal');
        const authForm = document.getElementById('authForm');

        let isLoginMode = true;

        // Slider logic
        slider.addEventListener('input', (e) => {
            label.textContent = e.target.value == 1500 ? '$1500+' : `$${e.target.value}`;
        });

        // Toggle UI states between login and register inside the Modal wrapper
        toggleAuthBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if(!isLoginMode) {
                registerFields.classList.remove('hidden');
                authBtn.textContent = 'Create Account';
                authSubtitle.textContent = 'Join the Space U Knight Network';
                toggleText.textContent = 'Already registered?';
                toggleAuthBtn.textContent = 'Sign In';
            } else {
                registerFields.classList.add('hidden');
                authBtn.textContent = 'Sign In';
                authSubtitle.textContent = 'Verify your identity to enter Space U';
                toggleText.textContent = 'New around campus?';
                toggleAuthBtn.textContent = 'Create Account';
            }
        });

        /<script src="app.js"></script>
</body>
</html>
    </script>
</body>
</html>
