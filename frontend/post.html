<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Listing | UCF Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .space-bg { background-image: radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)), radial-gradient(1px 1px at 75px 100px, #facc15, rgba(0,0,0,0)); background-size: 300px 300px; }
    </style>
</head>
<body class="h-full text-zinc-100 flex flex-col space-bg">

    <header class="bg-zinc-900/90 backdrop-blur-md border-b border-yellow-500/30 sticky top-0 z-50 px-6 py-4 flex items-center justify-between shadow-xl">
        <div class="flex items-center space-x-3">
            <svg class="w-7 h-7 text-yellow-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z"></path>
            </svg>
            <span class="text-xl font-bold tracking-wider uppercase text-zinc-50">UCF Student <span class="text-yellow-400">Marketplace</span></span>
        </div>
        <a href="index.html" class="text-sm text-zinc-400 hover:text-yellow-400 font-medium transition duration-200">← Back to Dashboard</a>
    </header>

    <main class="flex-1 max-w-2xl w-full mx-auto p-6 flex flex-col justify-center">
        <div class="bg-zinc-900/60 border border-zinc-800 rounded-xl p-8 backdrop-blur-sm shadow-2xl">
            <h2 class="text-2xl font-bold text-zinc-50 mb-1 tracking-wide">What are you selling?</h2>
            <p class="text-sm text-zinc-400 mb-6">Your listing will match your authenticated Knights handle automatically.</p>
            
            <form id="listingForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Item Title</label>
                    <input type="text" required placeholder="e.g., Cargo Pant Set, Nike Dunks, Microwave" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-yellow-500 transition">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Category</label>
                        <select id="categorySelect" required class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-yellow-500 transition text-zinc-300">
                            <option value="Clothes">Clothes & Shoes</option>
                            <option value="Housing">Housing & Subleases</option>
                            <option value="Appliances">Appliances & Items</option>
                            <option value="Services">Services (Cosmetics/Tutors)</option>
                            <option value="Textbooks">Textbooks</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Price ($)</label>
                        <input type="number" step="0.01" required placeholder="0.00" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-yellow-500 transition">
                    </div>
                </div>

                <div id="housingFields" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-4 border-l-2 border-yellow-500/40 pl-4 py-1 my-2">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Complex Name</label>
                        <input type="text" placeholder="e.g., Knights Circle, The Plaza" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-yellow-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Layout Type</label>
                        <input type="text" placeholder="e.g., 4x4 Room, 2x2" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-yellow-500 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Description / Condition</label>
                    <textarea rows="4" placeholder="Mention size, condition metrics, or campus pick up location instructions..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-yellow-500 transition resize-none"></textarea>
                </div>

                <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-zinc-950 font-bold uppercase tracking-wider text-xs py-3 rounded-lg shadow-lg transition duration-200">
                    Publish Listing
                </button>
            </form>
        </div>
    </main>
    <script>
        const categorySelect = document.getElementById('categorySelect');
        const housingFields = document.getElementById('housingFields');
        categorySelect.addEventListener('change', (e) => {
            if (e.target.value === 'Housing') { housingFields.classList.remove('hidden'); } 
            else { housingFields.classList.add('hidden'); }
        });
    </script>
</body>
</html>
