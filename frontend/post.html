<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Item | Space U</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-full bg-zinc-950 text-zinc-100 flex flex-col p-6 font-sans">

    <div class="max-w-xl w-full mx-auto bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-2xl mt-12">
        <div class="flex items-center justify-between mb-6 border-b border-zinc-800 pb-4">
            <h1 class="text-xl font-bold uppercase tracking-wider text-zinc-50">Create <span class="text-yellow-400">Listing</span></h1>
            <a href="index.html" class="text-xs text-zinc-400 hover:text-yellow-400 transition">&larr; Return Dashboard</a>
        </div>

        <form class="space-y-4" onsubmit="event.preventDefault(); alert('Success! Product catalog tracking updated.'); window.location.href='index.html';">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-1">Item Title</label>
                <input type="text" required placeholder="e.g., Nike Tech Fleece" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:border-yellow-400 transition">
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-1">Price ($)</label>
                <input type="number" required placeholder="0.00" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:border-yellow-400 transition">
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-1">Description</label>
                <textarea rows="3" required placeholder="Provide condition details and assembly parameters..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 focus:outline-none focus:border-yellow-400 transition"></textarea>
            </div>
            <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-zinc-950 font-bold uppercase tracking-wider text-xs py-3 rounded-lg shadow-lg transition duration-200 mt-2">
                Launch Listing Item
            </button>
        </form>
    </div>

</body>
</html>
